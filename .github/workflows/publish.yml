name: Publish Quarto site

# Re-render the site on push to main. Because executed R outputs are committed in
# _freeze/, this only re-renders markdown/layout — no R or Bioconductor needed in CI.
on:
  push:
    branches: [main]
    paths:
      - '**.qmd'
      - '_quarto.yml'
      - 'styles.*'
      - '_freeze/**'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Quarto
        uses: quarto-dev/quarto-actions/setup@v2

      - name: Render (uses frozen outputs, no execution)
        run: quarto render

      - name: Commit rendered site
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs
          git commit -m "Render site [skip ci]" || echo "No changes to commit"
          git push
